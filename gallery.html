<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Supreeth Kasetty</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <nav>
            <a href="index.html" class="logo"><img src="logo/logo_KBSS.png" alt="Supreeth Kasetty Logo"></a>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html" class="active">Gallery</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <section class="page-header">
            <h1>Complete Gallery</h1>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="image">Images</button>
                <button class="filter-btn" data-filter="video">Videos</button>
            </div>
        </section>
        <div class="grid gallery-grid" id="gallery"></div>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> Supreeth Kasetty. Hosted on GitHub Pages.</p>
    </footer>

    <div id="lightbox" class="lightbox">
        <span class="close" aria-label="Close">&times;</span>
        <div class="lightbox-content"></div>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
